# ONNX Runtime Burst Benchmark Configuration
# Raspberry Pi 5 - Quick performance test

experiment_name: "pi5_onnx_burst"
model_name: "mobilenetv2"
model_path: "models/mobilenetv2.onnx"
runtime: "onnx"

# Benchmark parameters
warmup_runs: 20
measured_runs: 500
sustained_duration_sec: 0  # 0 = use measured_runs instead
batch_size: 1
threads: 4

# Input configuration (auto-detected from model if not specified)
# input_shape: [1, 3, 224, 224]
# input_dtype: "float32"

# Telemetry
collect_temperature: true
collect_frequency: true
thermal_sample_interval_sec: 1.0

# Output
output_dir: "results"
save_raw_latencies: true
save_thermal_trace: true
generate_plots: true

# Notes
cooling_setup_note: "Passive heatsink, no fan"
ambient_note: "Room temperature ~22°C"
