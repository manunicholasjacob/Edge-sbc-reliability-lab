# ONNX Runtime Sustained Benchmark Configuration
# Raspberry Pi 5 - 10-minute thermal drift test

experiment_name: "pi5_onnx_sustained_10min"
model_name: "mobilenetv2"
model_path: "models/mobilenetv2.onnx"
runtime: "onnx"

# Benchmark parameters
warmup_runs: 20
measured_runs: 0  # Ignored when sustained_duration_sec > 0
sustained_duration_sec: 600  # 10 minutes
batch_size: 1
threads: 4

# Telemetry
collect_temperature: true
collect_frequency: true
thermal_sample_interval_sec: 1.0

# Output
output_dir: "results"
save_raw_latencies: true
save_thermal_trace: true
generate_plots: true

# Notes
cooling_setup_note: "Passive heatsink, no fan"
ambient_note: "Room temperature ~22°C"
